# 用户管理测试数据
# 重要：UserSaveReqVO 无 status / roleIds 字段
#   - 状态修改走 /system/user/update-status（body: id, status）
#   - 角色绑定走 /system/permission/assign-user-role（body: userId, roleIds）
user:
  create:
    username_prefix: "auto_user"
    password: "Test123456"      # 4-16 位
    nickname_prefix: "自动用户"
    mobile: "13800000000"
    deptId: 100                 # 系统已有部门 id（芋道根部门）
    status: 0
  search_existing:
    username: "admin"
  default_role_id: 1            # 系统已有角色 id

  # ===== 表驱动测试用例（由 common.data_provider.load_create_cases 读取）=====
  # payload_template: "valid" 自动用上面 create 字段生成合法 payload（随机化 username/nickname/mobile）
  # overrides: 覆盖 payload 的特定字段，构造非法/边界场景
  # setup: "duplicate" 表示先创建一条，再用同 username 再建以触发重复校验
  create_cases:
    - case_id: "USER_API_001"
      desc: "新增后台用户成功"
      expect_ok: true
    - case_id: "USER_API_002"
      desc: "用户名为空失败"
      overrides: { username: "" }
      expect_ok: false
      expect_msg_contains: "用户账号"
    - case_id: "USER_API_003"
      desc: "手机号格式错误失败"
      overrides: { mobile: "123" }
      expect_ok: false
      expect_msg_contains: "手机"
    - case_id: "USER_API_004"
      desc: "重复用户名失败"
      setup: "duplicate"
      expect_ok: false
      expect_msg_contains: "存在"
