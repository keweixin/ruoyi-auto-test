# 部门管理测试数据
# 对齐 DeptSaveReqVO：name / parentId / sort / leaderUserId / phone / email / status（无 remark）
dept:
  create:
    name_prefix: "auto_dept"
    parentId: 0          # 0 = 顶级部门（DeptDO.PARENT_ID_ROOT）
    sort: 1
    status: 0            # 0=开启 1=禁用
    phone: "13800000000"
    email: "autodept@test.com"
  search_existing:
    name: "研发部"        # 系统已有部门

  # ===== 表驱动测试用例 =====
  create_cases:
    - case_id: "DEPT_API_001"
      desc: "新增部门成功"
      expect_ok: true
    - case_id: "DEPT_API_002"
      desc: "新增部门名称为空失败"
      overrides: { name: "" }
      expect_ok: false
      expect_msg_contains: "名称"
    - case_id: "DEPT_API_003"
      desc: "新增重复部门失败"
      setup: "duplicate"
      expect_ok: false
      expect_msg_contains: "存在"
