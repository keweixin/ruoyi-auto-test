# 登录认证测试数据
login:
  # 正确账号（与 env.yaml 的 admin 一致）
  valid:
    username: "admin"
    password: "admin123"
  # 错误场景（参数化用）
  invalid:
    - { username: "admin", password: "wrong_pwd",   desc: "错误密码" }
    - { username: "",      password: "admin123",    desc: "空用户名" }
    - { username: "admin", password: "",            desc: "空密码" }
    - { username: "nouser", password: "admin123",   desc: "不存在用户" }
