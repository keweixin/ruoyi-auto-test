# 角色管理测试数据
# 重要：RoleSaveReqVO 无 menuIds / dataScope 字段
#   - 菜单分配走 /system/permission/assign-role-menu（body: roleId, menuIds）
#   - 数据权限走 /system/permission/assign-role-data-scope
role:
  create:
    name_prefix: "auto_role"
    code_prefix: "auto_role_code"
    sort: 1
    status: 0
    remark: "自动化测试角色"
  search_existing:
    name: "超级管理员"

  # ===== 表驱动测试用例 =====
  create_cases:
    - case_id: "ROLE_API_001"
      desc: "新增角色成功"
      expect_ok: true
    - case_id: "ROLE_API_002"
      desc: "新增角色名称为空失败"
      overrides: { name: "" }
      expect_ok: false
      expect_msg_contains: "名称"
    - case_id: "ROLE_API_003"
      desc: "新增重复角色失败"
      setup: "duplicate"
      expect_ok: false
      expect_msg_contains: "存在"
