[pytest]
addopts = -v --strict-markers --strict-config --alluredir=reports/allure-results
testpaths = api_auto/testcases ui_auto/testcases integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: 冒烟用例
    api: 接口用例
    ui: UI 用例
    flow: 接口联动/数据库校验用例
    db: 含数据库校验的用例
